<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perfil Profesional - Rodrigo Sandoval</title>
    <style>
      :root {
        --primary: #00c6ff;
        --secondary: #0072ff;
        --text: #ffffff;
      }

      body {
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
        background-size: 400% 400%;
        animation: gradientBG 15s ease infinite;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        overflow: hidden;
      }

      @keyframes gradientBG {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      .card {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        padding: 3rem;
        border-radius: 20px;
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        text-align: center;
        color: var(--text);
        max-width: 400px;
        width: 90%;
        transition: transform 0.1s ease;
        cursor: pointer;
      }

      h1 {
        margin: 0;
        font-size: 1.8rem;
        letter-spacing: 1px;
        border-bottom: 2px solid var(--primary);
        padding-bottom: 10px;
        display: inline-block;
      }

      .info-group {
        margin-top: 25px;
        text-align: left;
      }

      .info-item {
        margin-bottom: 15px;
        padding: 10px;
        background: rgba(0, 0, 0, 0.2);
        border-radius: 8px;
        transition: 0.3s;
      }

      .info-item:hover {
        background: rgba(0, 198, 255, 0.3);
        transform: translateX(10px);
      }

      label {
        display: block;
        font-size: 0.8rem;
        text-transform: uppercase;
        color: var(--primary);
        font-weight: bold;
      }

      span {
        font-size: 1.1rem;
      }

      .btn-interact {
        margin-top: 20px;
        padding: 10px 25px;
        border: none;
        border-radius: 25px;
        background: var(--primary);
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
      }

      .btn-interact:hover {
        box-shadow: 0 0 20px var(--primary);
        transform: scale(1.05);
      }
    </style>
  </head>
  <body>
    <div class="card" id="profileCard">
      <h1 id="userName">Rodrigo Sandoval Musito</h1>

      <div class="info-group">
        <div class="info-item">
          <label>📍 Ubicación</label>
          <span>Ciudad de Puebla</span>
        </div>
        <div class="info-item">
          <label>🎓 Carrera</label>
          <span>Ingeniería en Desarrollo de Software</span>
        </div>
        <div class="info-item">
          <label>🏛️ Universidad</label>
          <span>Universidad Tecmilenio</span>
        </div>
      </div>

      <button class="btn-interact" onclick="celebrate()">¡Saludar!</button>
    </div>

    <script>
      const card = document.getElementById("profileCard");

      // Efecto visual de inclinación (Tilt)
      document.addEventListener("mousemove", (e) => {
        let xAxis = (window.innerWidth / 2 - e.pageX) / 25;
        let yAxis = (window.innerHeight / 2 - e.pageY) / 25;
        card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
      });

      // Interactividad al hacer clic
      function celebrate() {
        const name = document.getElementById("userName");
        name.style.color = "#00ff88";
        alert(
          "¡Hola, Rodrigo! Éxito en tus proyectos de software en la Tecmilenio.",
        );
        setTimeout(() => {
          name.style.color = "#ffffff";
        }, 2000);
      }
    </script>
  </body>
</html>
